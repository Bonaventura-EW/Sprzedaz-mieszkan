<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SONAR SPRZEDAŻY — Oferty (cena w czasie)</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg?v=1">
<link rel="stylesheet" href="assets/style.css?v=1">
<style>
.of-wrap{padding:14px 18px;max-width:1320px;margin:0 auto;width:100%;overflow:auto;flex:1}
.of-toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.of-views{display:flex;gap:4px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:3px}
.of-views button{cursor:pointer;border:none;background:none;border-radius:999px;padding:6px 14px;font:inherit;font-size:13px;font-weight:700;color:var(--muted)}
.of-views button.active{background:var(--green-700);color:#fff}
.of-toolbar select,.of-toolbar input[type=search]{font:inherit;font-size:13px;padding:7px 10px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink)}
.of-chip{cursor:pointer;border:1px solid var(--line);background:#fff;border-radius:999px;padding:6px 12px;font-size:12px;font-weight:600;user-select:none}
.of-chip.on{background:var(--green-700);color:#fff;border-color:var(--green-700)}
.of-toolbar label.tg{display:inline-flex;align-items:center;gap:6px;font-size:13px;cursor:pointer}
.of-count{margin-left:auto;font-size:12px;color:var(--muted)}
.badge{font-size:10px;padding:1px 8px;border-radius:999px;font-weight:700;white-space:nowrap;display:inline-block}
.b-olx{background:#e0f2fe;color:#075985}.b-otodom{background:#ede9fe;color:#5b21b6}
.b-pierwotny{background:#e0f2fe;color:#075985}.b-wtorny{background:var(--lime-soft);color:var(--green-700)}.b-nieokreslony{background:#f1f5f9;color:#475569}
.b-type{background:#f1f5f9;color:#475569}
.trend-up{color:#dc2626;font-weight:700}.trend-down{color:#16a34a;font-weight:700}.trend-flat{color:#94a3b8}
.price{font-weight:800}.pricem{font-size:11px;color:var(--muted)}
.muted{color:var(--muted)}
table.of-tbl{width:100%;border-collapse:collapse;font-size:13px;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(2,22,10,.06)}
table.of-tbl th{background:var(--lime-soft);color:var(--green-800);text-align:left;padding:9px 10px;font-size:11px;text-transform:uppercase;letter-spacing:.03em;cursor:pointer;white-space:nowrap;position:sticky;top:0;z-index:2}
table.of-tbl th .ar{opacity:.5;font-size:10px}
table.of-tbl th.sorted .ar{opacity:1}
table.of-tbl td{padding:9px 10px;border-top:1px solid var(--line);vertical-align:middle}
table.of-tbl tr:hover td{background:#f6faf3}
.of-link{color:var(--green-600);text-decoration:none;font-size:11px}.of-link:hover{text-decoration:underline}
button.mini{cursor:pointer;border:1px solid var(--line);background:#fff;border-radius:8px;padding:3px 9px;font-size:13px}
button.mini:hover{border-color:var(--green-600)}
.spark{flex-shrink:0;vertical-align:middle}
.of-split{display:grid;grid-template-columns:minmax(300px,1fr) 1.4fr;gap:14px}
.list-pane{max-height:72vh;overflow:auto;border:1px solid var(--line);border-radius:12px;background:#fff}
.li{padding:10px 12px;border-bottom:1px solid var(--line);cursor:pointer;display:flex;gap:9px;align-items:center}
.li:hover{background:#f6faf3}.li.sel{background:var(--lime-soft)}
.li .chk{accent-color:var(--green-600);width:16px;height:16px;flex-shrink:0}
.li .li-main{flex:1;min-width:0}
.li .li-t{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chart-box{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px;position:sticky;top:0}
.legend{display:flex;gap:12px;flex-wrap:wrap;font-size:11px;margin-top:8px}
.legend span{display:inline-flex;align-items:center;gap:5px}.legend i{width:11px;height:3px;border-radius:2px;display:inline-block}
.kv{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin:8px 0}.kv b{color:var(--ink)}
.vtitle{font-size:15px;margin-bottom:4px;color:var(--green-800)}
.modal-bg{position:fixed;inset:0;background:rgba(5,46,22,.45);display:none;align-items:center;justify-content:center;z-index:60;padding:16px}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:16px;max-width:660px;width:100%;padding:18px;box-shadow:0 20px 60px rgba(2,22,10,.4)}
.modal .x{float:right;cursor:pointer;font-size:22px;color:var(--muted);border:none;background:none;line-height:1}
#of-loading{padding:60px;text-align:center;color:var(--muted)}
.empty{padding:40px;text-align:center;color:var(--muted)}
@media(max-width:780px){.of-split{grid-template-columns:1fr}.chart-box{position:static}}
</style>
</head>
<body>
<div id="app">
  <header class="header">
    <h1><span class="sonar-logo"></span><span>SONAR SPRZEDAŻY<span class="sub">oferty · cena w czasie</span></span></h1>
    <nav class="header-nav">
      <a href="index.html">🗺️ Mapa</a>
      <a href="analytics.html">📈 Analityka</a>
      <a href="monitoring.html">📊 Monitoring</a>
      <a href="oferty.html" class="active">📋 Oferty</a>
      <a href="zmiany.html">🔄 Ruch</a>
    </nav>
    <div class="header-meta">🕐 Ostatni scan: <strong id="last-scan">—</strong></div>
  </header>

  <div class="of-wrap">
    <div class="of-toolbar">
      <div class="of-views">
        <button id="btn-table" class="active" onclick="setView('table')">📊 Tabela</button>
        <button id="btn-split" onclick="setView('split')">⇆ Split</button>
      </div>
      <select id="sort-key" onchange="onSortChange()"></select>
      <button class="of-chip" id="sort-dir" onclick="toggleDir()">▼ malejąco</button>
      <input type="search" id="search" placeholder="szukaj: tytuł / dzielnica…" oninput="applyAndRender()">
      <label class="tg"><input type="checkbox" id="active-only" checked onchange="applyAndRender()"> tylko aktywne</label>
      <span id="src-chips"></span>
      <span class="of-count" id="of-count"></span>
    </div>

    <div id="of-loading">⏳ Ładowanie ofert…</div>
    <div id="view-table" style="display:none"></div>
    <div id="view-split" style="display:none"></div>
  </div>
</div>

<div class="modal-bg" id="modal"><div class="modal"><button class="x" onclick="closeModal()">×</button><div id="modal-body"></div></div></div>

<script src="assets/logo.js"></script>
<script>
const TODAY=new Date().toISOString().slice(0,10);
let OFFERS=[], VIEW='table', SORT={key:'price',dir:-1};
let SRCFILTER=new Set(), SPLITSEL=new Set();

const PLN=n=>n==null?'—':n.toLocaleString('pl-PL')+' zł';
const PERM2=n=>n==null?'—':n.toLocaleString('pl-PL')+' zł/m²';
const AREA=n=>n==null?'—':n.toLocaleString('pl-PL')+' m²';
function YK(n){if(n==null)return '';const a=Math.abs(n);
  if(a>=1e6)return (n/1e6).toFixed(a>=1e7?0:1).replace('.',',')+'M';
  if(a>=1e3)return Math.round(n/1e3)+'k';return String(n);}
const dnum=d=>{const[y,m,da]=d.split('-').map(Number);return Date.UTC(y,m-1,da);};
const SRC={olx:['OLX','b-olx'],otodom:['Otodom','b-otodom']};
const MARKET_LABELS={pierwotny:'pierwotny',wtorny:'wtórny',nieokreslony:'nieokreśl.'};
function srcInfo(o){return SRC[o.source]||[o.source||'?','b-type'];}
function srcBadge(o){const[l,c]=srcInfo(o);return `<span class="badge ${c}">${esc(l)}</span>`;}
function marketBadge(o){const m=o.market||'nieokreslony';return `<span class="badge b-${m}">${MARKET_LABELS[m]||m}</span>`;}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
function trendTxt(o){if(o._delta===0||o._tl.length<2)return '<span class="trend-flat">—</span>';
  const up=o._delta>0;return `<span class="trend-${up?'up':'down'}">${up?'▲':'▼'} ${PLN(Math.abs(o._delta))}</span>`;}
const palette=['#16a34a','#0ea5e9','#dc2626','#9333ea','#ca8a04','#0d9488','#db2777','#2563eb','#65a30d','#e11d48','#7c3aed','#ea580c'];

function buildTimeline(o){
  const start=(o.first_seen||'').slice(0,10);
  const changes=(o.price_changes||[]).filter(c=>c.changed_at&&c.new_price!=null);
  const initial=changes.length?changes[0].old_price:((o.price_history&&o.price_history.length)?o.price_history[0]:o.price);
  let tl=[];
  if(start)tl.push({d:start,p:initial});
  changes.forEach(c=>tl.push({d:c.changed_at.slice(0,10),p:c.new_price}));
  if(!tl.length)tl=[{d:start||TODAY,p:o.price}];
  const endD=o.active?TODAY:((o.last_seen||'').slice(0,10)||TODAY);
  if(endD>tl.at(-1).d)tl.push({d:endD,p:o.price});
  return tl;
}

function spark(o,w=88,h=26){
  const pts=o._tl;if(pts.length<2)return `<svg class="spark" width="${w}" height="${h}"><circle cx="${w/2}" cy="${h/2}" r="2.2" fill="#94a3b8"/></svg>`;
  const xs=pts.map(p=>dnum(p.d)),ys=pts.map(p=>p.p);
  const x0=Math.min(...xs),x1=Math.max(...xs),y0=Math.min(...ys),y1=Math.max(...ys);
  const sx=v=>x1===x0?w/2:4+(v-x0)/(x1-x0)*(w-8);
  const sy=v=>y1===y0?h/2:h-4-(v-y0)/(y1-y0)*(h-8);
  let d='';pts.forEach((p,i)=>{const X=sx(xs[i]),Y=sy(p.p);d+=(i===0?`M${X} ${Y}`:`H${X} V${Y}`);});
  const col=o._delta<0?'#16a34a':o._delta>0?'#dc2626':'#94a3b8';
  return `<svg class="spark" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><path d="${d}" fill="none" stroke="${col}" stroke-width="1.6" stroke-linejoin="round"/>${pts.map((p,i)=>`<circle cx="${sx(xs[i])}" cy="${sy(p.p)}" r="${i===pts.length-1?2.4:1.5}" fill="${col}"/>`).join('')}</svg>`;
}

function bigChart(list,opts={}){
  const W=opts.w||580,H=opts.h||320,L=64,R=16,T=14,B=34;
  const series=list.map((o,i)=>({o,color:palette[i%palette.length],pts:o._tl}));
  const allX=series.flatMap(s=>s.pts.map(p=>dnum(p.d)));
  const allY=series.flatMap(s=>s.pts.map(p=>p.p));
  if(!allX.length)return '<p class="muted">Brak danych.</p>';
  let x0=Math.min(...allX),x1=Math.max(...allX),y0=Math.min(...allY),y1=Math.max(...allY);
  if(x0===x1){x0-=864e5*7;x1+=864e5*7;}
  const ypad=(y1-y0)*.12||(y1*.1||1);y0=Math.max(0,y0-ypad);y1+=ypad;if(y1===y0)y1=y0+1;
  const sx=v=>L+(v-x0)/(x1-x0)*(W-L-R);
  const sy=v=>T+(1-(v-y0)/(y1-y0))*(H-T-B);
  let grid='';for(let i=0;i<=4;i++){const val=y0+(y1-y0)*i/4,Y=sy(val);
    grid+=`<line x1="${L}" y1="${Y}" x2="${W-R}" y2="${Y}" stroke="#e7efe7"/><text x="${L-6}" y="${Y+3}" text-anchor="end" font-size="9" fill="#94a3b8">${YK(val)}</text>`;}
  let xax='';[0,.5,1].forEach(f=>{const t=x0+(x1-x0)*f,X=sx(t),dt=new Date(t);
    const lbl=String(dt.getUTCDate()).padStart(2,'0')+'.'+String(dt.getUTCMonth()+1).padStart(2,'0');
    xax+=`<text x="${X}" y="${H-12}" text-anchor="middle" font-size="9" fill="#94a3b8">${lbl}</text>`;});
  let paths='';series.forEach(s=>{let d='';s.pts.forEach((p,i)=>{const X=sx(dnum(p.d)),Y=sy(p.p);d+=(i===0?`M${X} ${Y}`:`H${X} V${Y}`);});
    paths+=`<path d="${d}" fill="none" stroke="${s.color}" stroke-width="2.2" stroke-linejoin="round"/>`;
    paths+=s.pts.map(p=>`<circle cx="${sx(dnum(p.d))}" cy="${sy(p.p)}" r="3" fill="#fff" stroke="${s.color}" stroke-width="1.8"><title>${p.d}: ${PLN(p.p)}</title></circle>`).join('');});
  const leg=list.length>1?`<div class="legend">${series.map(s=>`<span><i style="background:${s.color}"></i>${esc(s.o.district||s.o.title||'').slice(0,22)} · ${AREA(s.o.area_m2)}</span>`).join('')}</div>`:'';
  return `<svg width="100%" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" style="max-height:${H}px">${grid}${xax}${paths}</svg>${leg}`;
}

function offerMeta(o){return `<div class="kv">${srcBadge(o)} ${marketBadge(o)}
  <span>📐 <b>${AREA(o.area_m2)}</b></span><span>🚪 <b>${o.rooms!=null?o.rooms+' pok.':'—'}</b></span>
  <span>💰 <b>${PLN(o.price)}</b></span><span>📊 <b>${PERM2(o.price_per_m2)}</b></span>
  <span>🔁 zmian: <b>${o._changes}</b></span><span>📅 od ${(o.first_seen||'—').slice(0,10)}</span>
  <span>${o.active?'🟢 aktywna':'⚪ nieaktywna'}</span>
  <a class="of-link" href="${esc(o.url)}" target="_blank" rel="noopener">otwórz ofertę ↗</a></div>`;}

const COLS=[
 {k:'title',l:'Oferta',t:'str',v:o=>o.title||''},
 {k:'source',l:'Źródło',t:'str',v:o=>srcInfo(o)[0]},
 {k:'market',l:'Rynek',t:'str',v:o=>o.market||''},
 {k:'district',l:'Dzielnica',t:'str',v:o=>o.district||''},
 {k:'rooms',l:'Pokoje',t:'num',v:o=>o.rooms},
 {k:'area_m2',l:'Pow.',t:'num',v:o=>o.area_m2},
 {k:'price',l:'Cena',t:'num',v:o=>o.price},
 {k:'price_per_m2',l:'Cena/m²',t:'num',v:o=>o.price_per_m2},
 {k:'_changes',l:'Zmian',t:'num',v:o=>o._changes},
 {k:'_delta',l:'Trend',t:'num',v:o=>o._delta},
];
const COL=k=>COLS.find(c=>c.k===k);
function cmp(a,b,key,dir){const c=COL(key);let va=c.v(a),vb=c.v(b);
  if(c.t==='num'){va=va==null?-Infinity:va;vb=vb==null?-Infinity:vb;return (va-vb)*dir;}
  va=(va||'').toString().toLowerCase();vb=(vb||'').toString().toLowerCase();
  return va<vb?-dir:va>vb?dir:0;}

function filtered(){
  const q=document.getElementById('search').value.trim().toLowerCase();
  const activeOnly=document.getElementById('active-only').checked;
  return OFFERS.filter(o=>{
    if(activeOnly&&!o.active)return false;
    if(SRCFILTER.size){if(!SRCFILTER.has(o.source))return false;}
    if(q){const hay=((o.title||'')+' '+(o.district||'')).toLowerCase();if(!hay.includes(q))return false;}
    return true;
  }).sort((a,b)=>cmp(a,b,SORT.key,SORT.dir));
}

function renderTable(rows){
  const head=COLS.map(c=>`<th class="${SORT.key===c.k?'sorted':''}" onclick="sortBy('${c.k}')">${c.l} <span class="ar">${SORT.key===c.k?(SORT.dir<0?'▼':'▲'):'↕'}</span></th>`).join('')+'<th></th>';
  const body=rows.map(o=>`<tr>
    <td><b>${esc(o.title||'—')}</b>${o.active?'':' <span class="badge b-type">nieakt.</span>'}</td>
    <td>${srcBadge(o)}</td><td>${marketBadge(o)}</td><td>${esc(o.district||'—')}</td>
    <td style="text-align:center">${o.rooms!=null?o.rooms:'—'}</td>
    <td>${AREA(o.area_m2)}</td><td class="price">${PLN(o.price)}</td><td class="pricem">${PERM2(o.price_per_m2)}</td>
    <td style="text-align:center">${o._changes||0}</td>
    <td>${spark(o)} ${trendTxt(o)}</td>
    <td><button class="mini" title="Wykres ceny" onclick="showChart('${esc(o.id)}')">📈</button></td>
  </tr>`).join('');
  document.getElementById('view-table').innerHTML=rows.length
    ? `<table class="of-tbl"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`
    : '<div class="empty">📭 Brak ofert dla wybranych filtrów.</div>';
}

function renderSplit(rows){
  if(SPLITSEL.size===0&&rows.length)SPLITSEL.add(rows[0].id);
  const chosen=rows.filter(o=>SPLITSEL.has(o.id));
  const list=rows.length?rows.map(o=>`<label class="li ${SPLITSEL.has(o.id)?'sel':''}">
    <input type="checkbox" class="chk" ${SPLITSEL.has(o.id)?'checked':''} onchange="toggleSplit('${esc(o.id)}')">
    <span class="li-main"><span class="li-t">${esc(o.title||'—')}</span>
    <span class="pricem">${srcBadge(o)} ${PLN(o.price)} · ${AREA(o.area_m2)} · ${PERM2(o.price_per_m2)}</span></span>
    ${spark(o)}</label>`).join(''):'<div class="empty">📭 Brak ofert.</div>';
  const chart=chosen.length
    ? `<h2 class="vtitle">📈 Cena w czasie (${chosen.length})</h2>${chosen.length===1?offerMeta(chosen[0]):''}${bigChart(chosen,{w:580,h:340})}`
    : '<p class="muted">Zaznacz oferty z listy, by nałożyć ich ceny.</p>';
  document.getElementById('view-split').innerHTML=
    `<div class="of-split"><div class="list-pane">${list}</div><div class="chart-box">${chart}</div></div>`;
}

function applyAndRender(){
  const rows=filtered();
  document.getElementById('of-count').textContent=`${rows.length} ofert`+(document.getElementById('active-only').checked?' (aktywne)':'');
  if(VIEW==='table')renderTable(rows);else renderSplit(rows);
}
function setView(v){VIEW=v;
  document.getElementById('btn-table').classList.toggle('active',v==='table');
  document.getElementById('btn-split').classList.toggle('active',v==='split');
  document.getElementById('view-table').style.display=v==='table'?'block':'none';
  document.getElementById('view-split').style.display=v==='split'?'block':'none';
  applyAndRender();}
function sortBy(k){if(SORT.key===k)SORT.dir*=-1;else{SORT.key=k;SORT.dir=(COL(k).t==='num')?-1:1;}syncSortUI();applyAndRender();}
function onSortChange(){SORT.key=document.getElementById('sort-key').value;SORT.dir=(COL(SORT.key).t==='num')?-1:1;syncSortUI();applyAndRender();}
function toggleDir(){SORT.dir*=-1;syncSortUI();applyAndRender();}
function syncSortUI(){document.getElementById('sort-key').value=SORT.key;
  document.getElementById('sort-dir').textContent=(SORT.dir<0?'▼ malejąco':'▲ rosnąco');}
function toggleSplit(id){SPLITSEL.has(id)?SPLITSEL.delete(id):SPLITSEL.add(id);renderSplit(filtered());}
function toggleSrc(k,el){SRCFILTER.has(k)?SRCFILTER.delete(k):SRCFILTER.add(k);el.classList.toggle('on');applyAndRender();}
function showChart(id){const o=OFFERS.find(x=>x.id===id);if(!o)return;
  document.getElementById('modal-body').innerHTML=`<h2 class="vtitle">📈 ${esc(o.title||'')}</h2>${offerMeta(o)}${bigChart([o],{w:600,h:320})}`;
  document.getElementById('modal').classList.add('show');}
function closeModal(){document.getElementById('modal').classList.remove('show');}
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

function buildToolbar(){
  document.getElementById('sort-key').innerHTML=COLS.map(c=>`<option value="${c.k}">Sortuj: ${c.l}</option>`).join('');
  const chips=[['olx','OLX'],['otodom','Otodom']];
  document.getElementById('src-chips').innerHTML=chips.map(([k,l])=>`<span class="of-chip" onclick="toggleSrc('${k}',this)">${l}</span>`).join('');
  syncSortUI();
}
async function load(){
  buildToolbar();
  try{
    const res=await fetch('data.json?v='+Date.now());
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();
    document.getElementById('last-scan').textContent=(data.last_scan||data.generated_at||'—').slice(0,16).replace('T',' ');
    OFFERS=(data.offers||[]).map(o=>{o._tl=buildTimeline(o);o._changes=(o.price_changes||[]).length;
      o._delta=o._tl.length>1?(o._tl.at(-1).p-o._tl[0].p):0;return o;});
    document.getElementById('of-loading').style.display='none';
    setView('table');
  }catch(e){
    document.getElementById('of-loading').innerHTML='❌ Błąd ładowania data.json: '+e.message;
  }
}
load();
</script>
</body>
</html>
